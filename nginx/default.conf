# DivisionUp — nginx: sirve el frontend estático y hace proxy a la API
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend estático (el prototipo conectado a la API)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # El frontend llama a /api/... → se redirige al backend FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # El coaching con LLM (70B) puede tardar: sube los timeouts (el 60s por
        # defecto provocaba 504). Vía Cloudflare el tope real del borde es ~100s,
        # por eso el frontend genera los informes de uno en uno (peticiones cortas).
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
