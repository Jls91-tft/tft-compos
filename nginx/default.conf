# Synapse — nginx: sirve el frontend estático y hace proxy a la API
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend estático (el prototipo conectado a la API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El frontend llama a /api/... → se redirige al backend FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
