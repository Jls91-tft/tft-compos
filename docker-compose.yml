# Synapse — orquestación de servicios (ETAPA 2)
# En el OTRO PC:  cp .env.example .env  →  rellena .env  →  docker compose up -d
#
# Servicios:
#   api    → backend FastAPI (http://localhost:8000, docs en /docs)
#   web    → nginx sirviendo el frontend + proxy a la API (http://localhost:8080)
#   ollama → IA local (http://localhost:11434); el modelo se descarga la 1ª vez

services:
  api:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Nota: tras el primer arranque, descarga el modelo con:
    #   docker compose exec ollama ollama pull llama3.1:8b

volumes:
  ollama_models:
