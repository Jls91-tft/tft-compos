# DivisionUp — despliegue de BETA en una sola VM Linux (p. ej. Google Cloud e2-micro gratis; ver docs/DEPLOY.md).
# Expuesto con Cloudflare Tunnel (HTTPS, SIN abrir puertos) + Cloudflare Access (beta cerrada).
#
#   cp .env.example .env   → rellena RIOT_API_KEY, LLM_PROVIDER=groq, GROQ_API_KEY, TUNNEL_TOKEN, USE_MOCK=false
#   docker compose -f docker-compose.prod.yml up -d --build
#
# La IA por defecto es Groq (gratis/rápido). Para usar Ollama local en la VM:
#   LLM_PROVIDER=ollama  y  docker compose -f docker-compose.prod.yml --profile local-llm up -d
# Para agregar datos de meta REALES en segundo plano (requiere clave de producción):
#   docker compose -f docker-compose.prod.yml --profile meta up -d

services:
  api:
    build: ./backend
    env_file: .env
    expose:
      - "8000"           # solo accesible dentro de la red de Docker (no se publica al host)
    # Aplica las migraciones de Alembic antes de arrancar (el resto de servicios
    # del núcleo dependen de api healthy → esquema ya migrado).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - meta_data:/app/app/data/generated   # lee los JSON de meta que genera el worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # --- FASE 2: núcleo de análisis (Postgres + Redis + cola RQ + poller) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: divisionup
      POSTGRES_USER: divisionup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en el .env}
    # e2-micro (1 GB RAM): Postgres en modo frugal.
    command: postgres -c shared_buffers=16MB -c max_connections=25
    volumes:
      - pg_data:/var/lib/postgresql/data
    mem_limit: 192m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U divisionup -d divisionup"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 24mb --maxmemory-policy noeviction --save ""
    mem_limit: 48m
    restart: unless-stopped

  # Worker de la cola de análisis (jobs: descargar partida → motor de hechos → BD).
  rq-worker:
    build: ./backend
    env_file: .env
    command: rq worker ${RQ_QUEUE:-analisis} --url ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 160m
    restart: unless-stopped

  # Scheduler de polling por puuid: detecta partidas nuevas y las encola.
  poller:
    build: ./backend
    env_file: .env
    command: python -m app.worker.poll_loop
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 128m
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Túnel de Cloudflare: publica 'web' en tu dominio con HTTPS, sin abrir puertos en la VM.
  # El destino (hostname -> http://web:80) se configura en el panel de Cloudflare Zero Trust.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped

  # IA local OPCIONAL — solo si LLM_PROVIDER=ollama. Actívalo con: --profile local-llm
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # Worker de META OPCIONAL — agrega datos reales del ladder a JSON cada META_REFRESH_SECONDS.
  # Actívalo con --profile meta. Requiere clave de PRODUCCIÓN de Riot y USE_MOCK=false.
  meta-worker:
    build: ./backend
    env_file: .env
    profiles: ["meta"]
    command: sh -c "while true; do python -m app.worker.refresh_meta; sleep ${META_REFRESH_SECONDS:-43200}; done"
    volumes:
      - meta_data:/app/app/data/generated
    restart: unless-stopped

volumes:
  ollama_models:
  meta_data:
  pg_data:
