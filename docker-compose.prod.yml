# DivisionUp — despliegue de BETA en una sola VM Linux (p. ej. Google Cloud e2-micro gratis; ver docs/DEPLOY.md).
# Expuesto con Cloudflare Tunnel (HTTPS, SIN abrir puertos) + Cloudflare Access (beta cerrada).
#
#   cp .env.example .env   → rellena RIOT_API_KEY, LLM_PROVIDER=groq, GROQ_API_KEY, TUNNEL_TOKEN, USE_MOCK=false
#   docker compose -f docker-compose.prod.yml up -d --build
#
# La IA por defecto es Groq (gratis/rápido). Para usar Ollama local en la VM:
#   LLM_PROVIDER=ollama  y  docker compose -f docker-compose.prod.yml --profile local-llm up -d
# Para agregar datos de meta REALES en segundo plano (requiere clave de producción):
#   docker compose -f docker-compose.prod.yml --profile meta up -d

services:
  api:
    build: ./backend
    env_file: .env
    expose:
      - "8000"           # solo accesible dentro de la red de Docker (no se publica al host)
    volumes:
      - meta_data:/app/app/data/generated   # lee los JSON de meta que genera el worker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Túnel de Cloudflare: publica 'web' en tu dominio con HTTPS, sin abrir puertos en la VM.
  # El destino (hostname -> http://web:80) se configura en el panel de Cloudflare Zero Trust.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped

  # IA local OPCIONAL — solo si LLM_PROVIDER=ollama. Actívalo con: --profile local-llm
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # Worker de META OPCIONAL — agrega datos reales del ladder a JSON cada META_REFRESH_SECONDS.
  # Actívalo con --profile meta. Requiere clave de PRODUCCIÓN de Riot y USE_MOCK=false.
  meta-worker:
    build: ./backend
    env_file: .env
    profiles: ["meta"]
    command: sh -c "while true; do python -m app.worker.refresh_meta; sleep ${META_REFRESH_SECONDS:-43200}; done"
    volumes:
      - meta_data:/app/app/data/generated
    restart: unless-stopped

volumes:
  ollama_models:
  meta_data:
