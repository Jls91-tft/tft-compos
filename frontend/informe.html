<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivisionUp — Informe de coaching</title>
<link rel="stylesheet" href="assets/synapse.css">
</head>
<body>
  <a href="#main" class="skip">Saltar al contenido</a>

  <header class="topbar">
    <a class="brand" href="app.html" aria-label="DivisionUp, inicio">
      <svg class="logo" width="30" height="30" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="9" cy="11" r="3.4" fill="#8B5CF6"/><circle cx="23" cy="9" r="2.4" fill="#22D3EE"/>
        <circle cx="22" cy="23" r="3" fill="#C4B5FD"/><circle cx="10" cy="23" r="2" fill="#8B5CF6"/>
        <path d="M9 11 L23 9 M9 11 L22 23 M23 9 L22 23 M10 23 L9 11" stroke="#8B5CF6" stroke-width="1.4" stroke-opacity=".55"/>
      </svg>
      <span class="name">DivisionUp</span>
    </a>
    <nav class="main-nav" aria-label="Secciones">
      <a class="navlink is-primary" href="app.html#coaching" aria-current="page">Coaching <span class="pill-ia">IA</span></a>
      <a class="navlink" href="app.html#stats">Estadísticas</a>
      <a class="navlink" href="app.html#meta">Meta</a>
    </nav>
  </header>

  <main id="main">
    <div class="crumbs">
      <span class="path"><a href="app.html#coaching">Coaching</a> ▸ <b>Informe de partida</b></span>
      <a class="back-link" href="app.html#coaching">← Volver a mis partidas</a>
      <button class="back-link" type="button" onclick="loadReport(true)" title="Vuelve a generar el análisis (consume una llamada a la IA)">↻ Regenerar análisis</button>
    </div>
    <div id="report-body"></div>

    <!-- Chat con el coach -->
    <section class="panel" id="chat" style="margin-top:22px;display:none;">
      <h3>Pregunta a tu coach</h3>
      <div class="chat-log" id="chat-log">
        <div class="msg coach"><div class="bubble">Pregúntame lo que quieras sobre esta partida. Aquí tienes algunas ideas:</div></div>
      </div>
      <div class="chat-suggest" id="chat-suggest"></div>
      <form class="chat-input" onsubmit="askFree(event)">
        <input type="text" id="chat-text" placeholder="Escribe tu pregunta…" autocomplete="off" aria-label="Tu pregunta para el coach">
        <button class="btn-send" type="submit" aria-label="Enviar pregunta">➤</button>
      </form>
    </section>
  </main>

  <footer>
    <div>DivisionUp — Informe de coaching</div>
    <div class="legal">Marca propia no afiliada a los titulares de los juegos.</div>
  </footer>

<script src="assets/api.js"></script>
<script>
const params = new URLSearchParams(location.search);
const GAME = params.get("game") === "lol" ? "lol" : "tft";
const ID = decodeURIComponent(params.get("id") || "");

const SUGGEST = {
  tft: ["¿Por qué perdí la pelea del 4-1?", "¿Qué augment debí coger?", "¿Cómo mejoro mi economía?"],
  lol: ["¿Por qué cedí objetivos?", "¿Cómo evito morir en su jungla?", "¿Qué cambio me hace subir?"],
};

const errorHTML = (e) => `<div class="error-box"><b>No se pudo cargar el informe.</b><br>${e.message}<br><span style="color:var(--muted)">Comprueba el backend (o <code>USE_MOCK=true</code>).</span></div>`;

function heroHTML(report, match) {
  let big = "", color = "var(--muted)", lbl = "", tag = "", tagcls = "tag-neutral";
  if (GAME === "tft" && match) {
    const pl = parseInt(match.result, 10);
    big = `${pl}.º`; lbl = "de 8 jugadores";
    if (pl === 1) { color = "var(--gold)"; tag = "1.er puesto"; tagcls = "tag-good"; }
    else if (pl <= 4) { color = "var(--good)"; tag = "Top 4"; tagcls = "tag-good"; }
    else { color = "var(--bad)"; tag = `${pl}.º`; tagcls = "tag-bad"; }
  } else if (match) {
    const win = match.result === "win";
    big = win ? "V" : "L"; color = win ? "var(--good)" : "var(--bad)";
    lbl = win ? "Victoria" : "Derrota"; tag = match.title?.split(" · ")[0] || ""; tagcls = "tag-neutral";
  } else {
    big = "★"; color = "var(--accent)"; lbl = "Partida";
  }
  const facts = match ? Object.entries(match.meta).map(([k, v]) => `<span>${k}: <b>${v}</b></span>`).join("") : "";
  return `<section class="report-hero">
    <div class="placement"><span class="big" style="color:${color}">${big}</span><span class="lbl">${lbl}</span>${tag ? `<span class="tag ${tagcls}">${tag}</span>` : ""}</div>
    <div class="verdict-wrap">
      <span class="ai-badge"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="#C4B5FD"/></svg> Análisis generado por DivisionUp IA</span>
      <p class="verdict">${report.summary || ""}</p>
      ${match ? `<div class="match-facts">${facts}</div>` : ""}
    </div>
  </section>`;
}

function reportHTML(report, match) {
  const kpis = (report.metrics || []).map(m => `<div class="kpi ${m.status || ""}"><div class="v">${m.value}</div><div class="k">${m.label}</div>${m.benchmark ? `<div class="bench">${m.benchmark}</div>` : ""}</div>`).join("");
  const sevTag = (s) => { const n = +s || 0; return `<span class="sev ${n >= 4 ? "sev-major" : "sev-minor"}">Sev ${n || "?"}</span>`; };
  const phaseTag = (p) => p ? `<span class="tag tag-neutral" style="font-size:11px">${({ early: "Early", mid: "Mid", late: "Late" })[p] || p}</span>` : "";
  const dec = (report.decision_errors || []).map(e => `<div class="err">
      <div class="err-head"><h4>${e.timestamp ? `<span style="color:var(--accent-2)">${e.timestamp}</span> · ` : ""}${e.what_happened}</h4><span style="display:flex;gap:6px;align-items:center">${phaseTag(e.phase)}${sevTag(e.severity)}</span></div>
      <dl><dt>Por qué falló</dt><dd>${e.why_wrong}</dd><dt class="fix">Qué hacer</dt><dd class="fix">${e.better_action}</dd>${e.evidence ? `<dt>Evidencia</dt><dd style="color:var(--muted)">${e.evidence}</dd>` : ""}</dl>
    </div>`).join("");
  const issuesHTML = (arr) => (arr || []).map(i => `<div class="err">
      <div class="err-head"><h4>${i.title}</h4>${i.severity ? sevTag(i.severity) : ""}</div>
      <dl><dt>Detalle</dt><dd>${i.detail}</dd>${i.evidence ? `<dt>Evidencia</dt><dd style="color:var(--muted)">${i.evidence}</dd>` : ""}</dl></div>`).join("");
  const macro = issuesHTML(report.macro_issues);
  const mech = issuesHTML(report.mechanical_issues);
  const mental = (report.mental_patterns || []).map(m => `<div class="err">
      <div class="err-head"><h4>${m.pattern}</h4></div>
      <dl><dt>Detalle</dt><dd>${m.detail}</dd>${m.evidence ? `<dt>Evidencia</dt><dd style="color:var(--muted)">${m.evidence}</dd>` : ""}</dl></div>`).join("");
  const plan = (report.top_3_actionable || []).map((a, i) => `<li><span class="num">${i + 1}</span> ${a}</li>`).join("");
  const comp = report.comparison ? `<div class="panel panel-compare"><h3>${GAME === "tft" ? "Comparación con el Top 1" : "Comparación con tu rival de línea"}</h3><p style="margin:0;line-height:1.6">${report.comparison}</p></div>` : "";
  const strong = (report.strengths || []).map(s => `<li>${s}</li>`).join("");
  return heroHTML(report, match) +
    `<div class="kpi-row">${kpis}</div>
     <div class="report-grid">
       <div class="col-main">
         ${comp}
         ${dec ? `<div class="panel"><h3>Errores de decisión</h3>${dec}</div>` : ""}
         ${macro ? `<div class="panel"><h3>Macro (rotaciones, objetivos, tempo)</h3>${macro}</div>` : ""}
         ${mech ? `<div class="panel"><h3>Mecánica (cs, trades, itemización)</h3>${mech}</div>` : ""}
         ${mental ? `<div class="panel"><h3>Patrones mentales</h3>${mental}</div>` : ""}
         ${!dec && !macro && !mech && !mental && !comp ? `<div class="panel"><p style="margin:0;color:var(--muted)">Partida limpia: la IA no detectó errores con evidencia suficiente.</p></div>` : ""}
       </div>
       <div class="col-side">
         ${strong ? `<div class="panel"><h3>Lo que hiciste bien</h3><ul class="win-list">${strong}</ul></div>` : ""}
         ${plan ? `<div class="panel"><h3>Para entrenar esta semana</h3><ol class="action-list">${plan}</ol></div>` : ""}
       </div>
     </div>`;
}

async function loadReport(regenerate = false) {
  const body = document.getElementById("report-body");
  body.innerHTML = `<div class="loading"><span class="spinner"></span> ${regenerate ? "Regenerando" : "Generando"} tu informe de coaching…</div>`;
  try {
    const [report, matches] = await Promise.all([
      API.report(GAME, ID, regenerate),
      API.matches(GAME).catch(() => []),
    ]);
    const match = matches.find(m => m.id === ID) || null;
    body.innerHTML = staleHTML(report) + reportHTML(report, match);
    reportLang = API.lang();
    hideLangReload();
    initChat();
  } catch (e) { body.innerHTML = errorHTML(e); }
}
function staleHTML(report) {
  if (!report || !report.stale) return "";
  return `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 16px;padding:12px 16px;border:1px solid var(--warn);border-radius:12px;background:color-mix(in srgb,var(--warn) 12%,transparent);font-size:13.5px;">
    Este análisis se generó con una versión anterior del coach.
    <button type="button" class="btn btn-ghost btn-sm" onclick="loadReport(true)">Regenerar con la versión actual</button></div>`;
}

/* Si cambias el idioma con el informe ya generado, ofrecemos regenerarlo
   en el nuevo idioma con un clic (no se rehace solo: evita gasto de IA). */
let reportLang = null;
function ensureLangBar() {
  let bar = document.getElementById("lang-reload");
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "lang-reload";
    bar.style.cssText = "display:none;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 16px;padding:12px 16px;border:1px solid rgba(139,92,246,.4);border-radius:12px;background:var(--accent-soft);font-size:14px;";
    document.getElementById("main").insertBefore(bar, document.getElementById("report-body"));
  }
  return bar;
}
function showLangReload() {
  const bar = ensureLangBar();
  bar.innerHTML = '<span>Has cambiado el idioma de la web.</span> <button type="button" class="btn btn-ghost btn-sm" onclick="loadReport()">Regenerar el informe en este idioma</button>';
  bar.style.display = "flex";
}
function hideLangReload() { const b = document.getElementById("lang-reload"); if (b) b.style.display = "none"; }
document.addEventListener("synapse:lang", function (e) { if (reportLang && e.detail !== reportLang) showLangReload(); });

/* ---------- Chat ---------- */
function initChat() {
  document.getElementById("chat").style.display = "";
  document.getElementById("chat-suggest").innerHTML =
    SUGGEST[GAME].map(q => `<button class="sug" type="button" onclick="ask(this.textContent)">${q}</button>`).join("");
}
function addMsg(who, text) {
  const log = document.getElementById("chat-log");
  const d = document.createElement("div"); d.className = "msg " + who;
  d.innerHTML = '<div class="bubble"></div>'; d.querySelector(".bubble").textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
}
async function ask(question) {
  addMsg("user", question);
  const typing = addMsg("coach typing", "escribiendo…");
  try {
    const res = await API.chat(GAME, ID, question);
    typing.classList.remove("typing"); typing.querySelector(".bubble").textContent = res.answer;
  } catch (e) {
    typing.classList.remove("typing"); typing.querySelector(".bubble").textContent = "No pude responder ahora mismo: " + e.message;
  }
  document.getElementById("chat-log").scrollTop = 9e9;
}
function askFree(e) {
  e.preventDefault();
  const inp = document.getElementById("chat-text"); const v = inp.value.trim();
  if (!v) return; inp.value = ""; ask(v);
}

loadReport();
</script>
<script src="assets/i18n.js"></script>
</body>
</html>
